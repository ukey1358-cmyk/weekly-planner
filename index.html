<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 계획</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  /* ── Airbnb-inspired tokens ──
     primary (Rausch) #ff385c · ink #222222 · canvas #ffffff
     hairline #dddddd · hairline-soft #ebebeb · muted #6a6a6a · muted-soft #929292
     surface-soft #f7f7f7 · radius: btn 8px / card 14px / pill 999px
     Font: Inter (Latin) + Pretendard (Korean) as Cereal/Circular substitute */
  * { box-sizing: border-box; }
  body {
    font-family: 'Inter', 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", sans-serif;
    margin: 0;
    background: #ffffff;
    color: #222222;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Header */
  .header {
    background: #ffffff;
    padding: 14px 24px;
    border-bottom: 1px solid #ebebeb;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 10;
  }
  .header h1 {
    margin: 0; font-size: 22px; font-weight: 500;
    letter-spacing: -0.44px; color: #222222;
  }

  /* Week navigation */
  .week-nav { display: flex; align-items: center; gap: 8px; }
  .week-nav button {
    border: 1px solid #dddddd; background: #ffffff; color: #222222;
    cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 500;
    transition: background 0.15s;
  }
  .week-nav button:hover { background: #f7f7f7; }
  #prevWeek, #nextWeek {
    width: 36px; height: 36px; border-radius: 50%; padding: 0;
    font-size: 18px; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
  }
  #todayBtn { padding: 0 16px; border-radius: 999px; height: 36px; }
  .week-label {
    font-weight: 500; min-width: 170px; text-align: center;
    font-size: 14px; color: #222222; margin-left: 4px;
  }
  .spacer { flex: 1; }

  /* Sync status */
  .sync-status {
    font-size: 13px; color: #6a6a6a;
    display: flex; align-items: center; gap: 8px;
  }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #c1c1c1; }
  .sync-dot.synced { background: #2e7d32; }
  .sync-dot.syncing { background: #f9ab00; animation: pulse 1s infinite; }
  .sync-dot.error { background: #ff385c; }
  @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: .35 } }

  /* Buttons — secondary (white + ink outline) */
  .btn {
    padding: 0 16px; height: 40px;
    border: 1px solid #222222; background: #ffffff; color: #222222;
    border-radius: 8px; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 500; line-height: 1;
    transition: background 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: #f7f7f7; }
  /* Primary — Rausch */
  .btn-primary {
    background: #ff385c; color: #ffffff; border-color: #ff385c;
  }
  .btn-primary:hover { background: #e00b41; border-color: #e00b41; }

  /* Toolbar */
  .toolbar {
    padding: 14px 24px; background: #ffffff; border-bottom: 1px solid #ebebeb;
    display: flex; gap: 8px; flex-wrap: wrap;
  }

  /* Table — card with single shadow tier */
  .table-wrap { padding: 24px; overflow-x: auto; }
  table {
    width: 100%; background: #ffffff;
    border-radius: 14px; border: 1px solid #dddddd;
    border-collapse: separate; border-spacing: 0;
    overflow: hidden; min-width: 1100px;
    box-shadow:
      rgba(0,0,0,0.02) 0 0 0 1px,
      rgba(0,0,0,0.04) 0 2px 6px 0,
      rgba(0,0,0,0.06) 0 4px 8px 0;
  }
  th, td {
    border-bottom: 1px solid #ebebeb;
    border-right: 1px solid #ebebeb;
    padding: 12px; vertical-align: top; text-align: left;
  }
  tr:last-child td { border-bottom: none; }
  th:last-child, td:last-child { border-right: none; }
  thead th {
    background: #ffffff; font-weight: 600; font-size: 14px;
    text-align: center; color: #222222;
  }
  thead .day-date {
    font-size: 12px; color: #6a6a6a; font-weight: 400;
    display: block; margin-top: 2px;
  }
  thead .today { color: #ff385c; }
  thead .today .day-date { color: #ff385c; }

  .col-act { width: 36px; }
  .col-role { width: 120px; min-width: 90px; vertical-align: middle; }
  .col-goal { width: 220px; min-width: 160px; }
  .col-day { min-width: 145px; }

  /* Editable cells */
  .editable {
    min-height: 24px; cursor: text; outline: none;
    padding: 6px 8px; border-radius: 6px;
    white-space: pre-wrap; word-break: break-word;
    font-size: 15px; color: #222222;
    transition: box-shadow 0.15s;
  }
  .editable:focus { box-shadow: inset 0 0 0 2px #222222; }
  .editable:empty::before {
    content: attr(data-placeholder);
    color: #929292; font-weight: 400;
  }

  /* Day cells */
  .day-cell { padding: 8px !important; }
  .task-list { display: flex; flex-direction: column; gap: 2px; }
  .task {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 6px 8px; border-radius: 8px; font-size: 14px;
    transition: background 0.15s;
  }
  .task:hover { background: #f7f7f7; }
  .task input[type="checkbox"] {
    margin: 3px 0 0 0; cursor: pointer; flex-shrink: 0;
    accent-color: #222222; width: 16px; height: 16px;
  }
  .task-text {
    flex: 1; outline: none; word-break: break-word; cursor: text;
    padding: 1px 4px; border-radius: 4px; min-height: 20px; color: #222222;
    transition: box-shadow 0.15s;
  }
  .task-text:focus { box-shadow: inset 0 0 0 1.5px #222222; }
  .task.done .task-text { text-decoration: line-through; color: #929292; }
  .task-del {
    opacity: 0; background: none; border: 1px solid transparent;
    color: #6a6a6a; cursor: pointer; font-size: 16px;
    padding: 0; line-height: 1; border-radius: 50%;
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .task:hover .task-del { opacity: 1; }
  .task-del:hover { color: #ffffff; background: #ff385c; border-color: #ff385c; }

  .add-task {
    margin-top: 6px; padding: 6px 8px;
    border: 1px dashed #dddddd; border-radius: 8px;
    cursor: pointer; color: #6a6a6a; font-size: 13px; font-weight: 500;
    text-align: center; transition: all 0.15s;
  }
  .add-task:hover { border-color: #222222; color: #222222; }

  .row-del {
    background: none; border: none;
    color: #c1c1c1; cursor: pointer; font-size: 18px;
    opacity: 0; padding: 0; line-height: 1; border-radius: 50%;
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  tr:hover .row-del { opacity: 1; }
  .row-del:hover { color: #ffffff; background: #ff385c; }

  /* Loading overlay */
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(255,255,255,.9);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; font-size: 15px; color: #6a6a6a; font-weight: 500;
  }

  @media (max-width: 768px) {
    .header { padding: 10px 16px; gap: 8px; }
    .header h1 { font-size: 18px; }
    .week-label { min-width: auto; font-size: 13px; }
    .toolbar { padding: 10px 16px; gap: 6px; }
    .btn { height: 36px; padding: 0 12px; font-size: 13px; }
    .table-wrap { padding: 12px; }
    th, td { padding: 8px; font-size: 13px; }
    .editable { font-size: 14px; }
    .col-role { min-width: 80px; }
    .col-goal { min-width: 120px; }
    .col-day { min-width: 110px; }
    table { min-width: 900px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📋 주간 계획</h1>
  <div class="week-nav">
    <button id="prevWeek" title="이전 주">‹</button>
    <button id="todayBtn">이번 주</button>
    <button id="nextWeek" title="다음 주">›</button>
    <span class="week-label" id="weekLabel"></span>
  </div>
  <div class="spacer"></div>
  <div class="sync-status">
    <span class="sync-dot" id="syncDot"></span>
    <span id="syncText">연결 중...</span>
  </div>
</div>

<div class="toolbar">
  <button class="btn btn-primary" id="addRowBtn">+ 역할 추가</button>
  <button class="btn" id="addGoalBtn">+ 주간 목표 추가</button>
  <button class="btn" id="copyLastBtn">↻ 지난주 항목 가져오기</button>
  <button class="btn" id="exportBtn">⬇ 내보내기</button>
  <button class="btn" id="importBtn">⬆ 가져오기</button>
  <button class="btn" id="reloadBtn" title="서버에서 새로고침">⟳ 새로고침</button>
  <input type="file" id="importFile" accept=".xlsx" style="display:none">
</div>

<div class="table-wrap">
  <table id="planTable">
    <thead>
      <tr>
        <th class="col-act"></th>
        <th class="col-role">역할</th>
        <th class="col-goal">주간 목표</th>
        <th class="col-day" id="th-0">월<span class="day-date"></span></th>
        <th class="col-day" id="th-1">화<span class="day-date"></span></th>
        <th class="col-day" id="th-2">수<span class="day-date"></span></th>
        <th class="col-day" id="th-3">목<span class="day-date"></span></th>
        <th class="col-day" id="th-4">금<span class="day-date"></span></th>
        <th class="col-day" id="th-5">토<span class="day-date"></span></th>
        <th class="col-day" id="th-6">일<span class="day-date"></span></th>
      </tr>
    </thead>
    <tbody id="planBody"></tbody>
  </table>
</div>

<div class="loading-overlay" id="loadingOverlay">불러오는 중...</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
// =====================================================
// 설정 — 본인의 Apps Script 웹앱 URL을 입력하세요
// 예: 'https://script.google.com/macros/s/AKfycb.../exec'
// =====================================================
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwRBorRb1Y2W3IWSRyXfIgTHkoiKQ3kFoewGilKzR0Sx6tsvu_taqInErsSO2AqhoL4/exec';
const STORAGE_KEY = 'weekly-planner-cache';

// =====================================================
// STATE
// =====================================================
let state = { weeks: {}, lastModified: 0 };
let currentWeekKey = '';
let currentWeekStart = null;

const dirtyWeeks = new Set();
let saveTimer = null;
let inFlightSaves = 0;

// =====================================================
// API HELPERS (fetch → Apps Script web app)
// =====================================================
async function apiGet(action) {
  const url = `${WEB_APP_URL}?action=${encodeURIComponent(action)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function apiPost(payload) {
  // Content-Type: text/plain → CORS preflight 회피 (Apps Script 웹앱 호환)
  const res = await fetch(WEB_APP_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function isConfigured() {
  return WEB_APP_URL && !WEB_APP_URL.startsWith('YOUR_');
}

// =====================================================
// DATE UTILITIES
// =====================================================
function pad(n) { return n < 10 ? '0' + n : '' + n; }

function getMonday(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}

function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNum = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return { year: d.getUTCFullYear(), week: weekNum };
}

function weekKey(date) {
  const { year, week } = getISOWeek(date);
  return `${year}-W${pad(week)}`;
}

function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function formatDate(date) { return `${date.getMonth() + 1}/${date.getDate()}`; }

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear()
    && a.getMonth() === b.getMonth()
    && a.getDate() === b.getDate();
}

// =====================================================
// STATE HELPERS
// =====================================================
function uuid() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function emptyRow() {
  return { id: uuid(), role: '', goal: '',
    tasks: { 0: [], 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] } };
}

function emptyTask(text = '') { return { id: uuid(), text, done: false }; }

function normalizeRow(row) {
  if (!row.tasks) row.tasks = {};
  for (let i = 0; i < 7; i++) {
    if (!Array.isArray(row.tasks[i])) row.tasks[i] = [];
  }
  return row;
}

function getCurrentRows() {
  if (!state.weeks[currentWeekKey]) state.weeks[currentWeekKey] = [];
  state.weeks[currentWeekKey].forEach(normalizeRow);
  return state.weeks[currentWeekKey];
}

function touch() {
  state.lastModified = Date.now();
  saveLocalCache();
  dirtyWeeks.add(currentWeekKey);
  queueServerSave();
}

// =====================================================
// LOCAL CACHE
// =====================================================
function saveLocalCache() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.error('localStorage save', e); }
}
function loadLocalCache() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d && typeof d === 'object') {
        state = { weeks: d.weeks || {}, lastModified: d.lastModified || 0 };
      }
    }
  } catch (e) { console.error('localStorage load', e); }
}

// =====================================================
// SERVER SYNC
// =====================================================
function setSyncStatus(status, text) {
  document.getElementById('syncDot').className = 'sync-dot ' + status;
  document.getElementById('syncText').textContent = text;
}

function queueServerSave() {
  if (!isConfigured()) return; // 로컬 전용 모드 — 저장 시도하지 않음
  if (saveTimer) clearTimeout(saveTimer);
  setSyncStatus('syncing', '저장 중...');
  saveTimer = setTimeout(flushSaves, 1200);
}

function flushSaves() {
  if (dirtyWeeks.size === 0) {
    setSyncStatus('synced', '저장됨');
    return;
  }
  const keys = Array.from(dirtyWeeks);
  dirtyWeeks.clear();

  let remaining = keys.length;
  let hadError = false;

  keys.forEach(key => {
    inFlightSaves++;
    const data = state.weeks[key] || [];
    apiPost({ action: 'saveWeek', weekKey: key, data })
      .then(() => {
        inFlightSaves--;
        remaining--;
        if (remaining === 0) {
          setSyncStatus(hadError ? 'error' : 'synced',
                        hadError ? '저장 오류' : '저장됨');
        }
      })
      .catch(err => {
        inFlightSaves--;
        remaining--;
        hadError = true;
        dirtyWeeks.add(key);  // 재시도 대상
        console.error('save error', err);
        if (remaining === 0) setSyncStatus('error', '저장 오류 (자동 재시도)');
        setTimeout(() => { if (dirtyWeeks.size > 0) queueServerSave(); }, 30000);
      });
  });
}

function loadFromServer() {
  if (!isConfigured()) {
    document.getElementById('loadingOverlay').style.display = 'none';
    setSyncStatus('error', 'WEB_APP_URL 설정 필요 (로컬 전용 모드)');
    render();
    return;
  }
  setSyncStatus('syncing', '동기화 중...');
  apiGet('getAllData')
    .then(serverData => {
      document.getElementById('loadingOverlay').style.display = 'none';
      const serverMod = (serverData && serverData.lastModified) || 0;
      const localMod = state.lastModified || 0;
      const localHasData = Object.keys(state.weeks || {}).length > 0;

      if (localHasData && localMod > serverMod) {
        // 로컬이 최신: 모두 푸시
        for (const key in state.weeks) dirtyWeeks.add(key);
        queueServerSave();
      } else {
        // 서버 사용
        state = { weeks: (serverData && serverData.weeks) || {}, lastModified: serverMod };
        saveLocalCache();
        render();
        setSyncStatus('synced', '동기화됨');
      }
    })
    .catch(err => {
      document.getElementById('loadingOverlay').style.display = 'none';
      console.error('load error', err);
      setSyncStatus('error', '서버 연결 실패 — 로컬 데이터 표시중');
      render();
    });
}

// =====================================================
// RENDER
// =====================================================
function render() {
  renderHeader();
  renderTable();
}

function renderHeader() {
  const start = currentWeekStart;
  const end = addDays(start, 6);
  document.getElementById('weekLabel').textContent =
    `${start.getFullYear()}. ${formatDate(start)} ~ ${formatDate(end)}`;

  const today = new Date(); today.setHours(0,0,0,0);
  const dayNames = ['월','화','수','목','금','토','일'];
  for (let i = 0; i < 7; i++) {
    const day = addDays(start, i);
    const th = document.getElementById('th-' + i);
    th.innerHTML = `${dayNames[i]}<span class="day-date">${formatDate(day)}</span>`;
    th.classList.toggle('today', isSameDay(day, today));
  }
}

function renderTable() {
  const tbody = document.getElementById('planBody');
  tbody.innerHTML = '';
  const rows = getCurrentRows();

  let i = 0;
  while (i < rows.length) {
    let groupSize = 1;
    // 같은 역할인 연속 행을 한 그룹으로 (빈 역할은 그룹화하지 않음)
    while (
      rows[i].role !== '' &&
      i + groupSize < rows.length &&
      rows[i + groupSize].role === rows[i].role
    ) {
      groupSize++;
    }
    tbody.appendChild(renderRow(rows[i], groupSize, true));
    for (let j = 1; j < groupSize; j++) {
      tbody.appendChild(renderRow(rows[i + j], 0, false));
    }
    i += groupSize;
  }

  if (rows.length === 0) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="10" style="text-align:center;color:#929292;padding:32px;">역할이 없습니다. 좌측 상단 "+ 역할 추가" 버튼을 눌러 시작하세요.</td>';
    tbody.appendChild(tr);
  }
}

function renderRow(row, groupSize, isHead) {
  const tr = document.createElement('tr');
  tr.dataset.rowId = row.id;

  const tdAct = document.createElement('td');
  tdAct.className = 'col-act';
  const delBtn = document.createElement('button');
  delBtn.className = 'row-del';
  delBtn.textContent = '×';
  delBtn.title = '역할 삭제';
  delBtn.onclick = () => deleteRow(row.id);
  tdAct.appendChild(delBtn);
  tr.appendChild(tdAct);

  if (isHead) {
    const roleCell = makeEditableCell(row.role, '역할', 'col-role', v => setRoleForGroup(row.id, v));
    if (groupSize > 1) roleCell.rowSpan = groupSize;
    tr.appendChild(roleCell);
  }
  tr.appendChild(makeGoalCell(row));

  for (let i = 0; i < 7; i++) tr.appendChild(makeDayCell(row, i));
  return tr;
}

function setRoleForGroup(rowId, newRole) {
  const rows = getCurrentRows();
  const idx = rows.findIndex(r => r.id === rowId);
  if (idx < 0) return;
  const oldRole = rows[idx].role;
  if (oldRole === newRole) return;
  rows[idx].role = newRole;
  // 같은 (옛) 역할을 가진 후속 연속 행도 함께 변경 (그룹 일관성 유지)
  if (oldRole !== '') {
    for (let j = idx + 1; j < rows.length; j++) {
      if (rows[j].role !== oldRole) break;
      rows[j].role = newRole;
    }
  }
  touch();
  render();
}

function makeGoalCell(row) {
  const td = document.createElement('td');
  td.className = 'col-goal';

  const div = document.createElement('div');
  div.className = 'editable';
  div.contentEditable = 'true';
  div.dataset.placeholder = '주간 목표';
  div.textContent = row.goal || '';
  div.addEventListener('blur', () => { row.goal = div.textContent.trim(); touch(); });
  div.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); div.blur(); }
    if (e.key === 'Escape') div.blur();
  });
  td.appendChild(div);

  const addBtn = document.createElement('div');
  addBtn.className = 'add-task';
  addBtn.textContent = '+ 주간 목표 추가';
  addBtn.onclick = () => addGoalAfter(row.id);
  td.appendChild(addBtn);

  return td;
}

function makeEditableCell(value, placeholder, cls, onSave) {
  const td = document.createElement('td');
  td.className = cls;
  const div = document.createElement('div');
  div.className = 'editable';
  div.contentEditable = 'true';
  div.dataset.placeholder = placeholder;
  div.textContent = value || '';
  div.addEventListener('blur', () => onSave(div.textContent.trim()));
  div.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); div.blur(); }
    if (e.key === 'Escape') div.blur();
  });
  td.appendChild(div);
  return td;
}

function makeDayCell(row, dayIdx) {
  const td = document.createElement('td');
  td.className = 'day-cell';
  const list = document.createElement('div');
  list.className = 'task-list';

  if (!row.tasks[dayIdx]) row.tasks[dayIdx] = [];
  row.tasks[dayIdx].forEach(task => list.appendChild(makeTaskElement(row, dayIdx, task)));

  const addBtn = document.createElement('div');
  addBtn.className = 'add-task';
  addBtn.textContent = '+ 할 일 추가';
  addBtn.onclick = () => {
    const task = emptyTask('');
    row.tasks[dayIdx].push(task);
    const el = makeTaskElement(row, dayIdx, task);
    list.appendChild(el);
    el.querySelector('.task-text').focus();
  };

  td.appendChild(list);
  td.appendChild(addBtn);
  return td;
}

function makeTaskElement(row, dayIdx, task) {
  const wrap = document.createElement('div');
  wrap.className = 'task' + (task.done ? ' done' : '');

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = !!task.done;
  cb.onchange = () => {
    task.done = cb.checked;
    wrap.classList.toggle('done', task.done);
    touch();
  };

  const txt = document.createElement('div');
  txt.className = 'task-text';
  txt.contentEditable = 'true';
  txt.textContent = task.text;
  txt.addEventListener('blur', () => {
    const v = txt.textContent.trim();
    if (!v) {
      row.tasks[dayIdx] = row.tasks[dayIdx].filter(t => t.id !== task.id);
      wrap.remove();
      touch();
    } else if (v !== task.text) {
      task.text = v;
      touch();
    }
  });
  txt.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); txt.blur(); }
    if (e.key === 'Escape') txt.blur();
  });

  const del = document.createElement('button');
  del.className = 'task-del';
  del.textContent = '×';
  del.title = '삭제';
  del.onclick = () => {
    row.tasks[dayIdx] = row.tasks[dayIdx].filter(t => t.id !== task.id);
    wrap.remove();
    touch();
  };

  wrap.appendChild(cb);
  wrap.appendChild(txt);
  wrap.appendChild(del);
  return wrap;
}

// =====================================================
// ACTIONS
// =====================================================
function addRow() {
  getCurrentRows().push(emptyRow());
  touch();
  render();
}

function addGoal() {
  const rows = getCurrentRows();
  if (rows.length === 0) {
    alert('먼저 역할을 추가하세요.');
    return;
  }
  addGoalAfter(rows[rows.length - 1].id);
}

function addGoalAfter(rowId) {
  const rows = getCurrentRows();
  const idx = rows.findIndex(r => r.id === rowId);
  if (idx < 0) return;
  const newRow = {
    id: uuid(),
    role: rows[idx].role || '',
    goal: '',
    tasks: { 0: [], 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] }
  };
  rows.splice(idx + 1, 0, newRow);
  touch();
  render();
  const tr = document.querySelector(`tr[data-row-id="${newRow.id}"]`);
  if (tr) {
    const goalCell = tr.querySelector('.col-goal .editable');
    if (goalCell) goalCell.focus();
  }
}

function deleteRow(id) {
  if (!confirm('이 역할을 삭제할까요?')) return;
  state.weeks[currentWeekKey] = getCurrentRows().filter(r => r.id !== id);
  touch();
  render();
}

function copyFromLastWeek() {
  const prev = addDays(currentWeekStart, -7);
  const prevKey = weekKey(prev);
  const prevRows = state.weeks[prevKey];
  if (!prevRows || prevRows.length === 0) {
    alert('지난주에 역할이 없습니다.');
    return;
  }
  if (getCurrentRows().length > 0 && !confirm('이번 주에 이미 역할이 있습니다. 추가로 가져올까요?')) return;
  prevRows.forEach(r => {
    getCurrentRows().push({
      id: uuid(), role: r.role, goal: r.goal,
      tasks: { 0: [], 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] }
    });
  });
  touch();
  render();
}

function gotoWeek(date) {
  currentWeekStart = getMonday(date);
  currentWeekKey = weekKey(currentWeekStart);
  render();
}

function exportData() {
  if (typeof XLSX === 'undefined') {
    alert('엑셀 라이브러리를 불러올 수 없습니다. 네트워크를 확인해주세요.');
    return;
  }
  const dayNames = ['월','화','수','목','금','토','일'];
  const data = [['주 시작일', '역할', '주간 목표', ...dayNames]];
  const sortedKeys = Object.keys(state.weeks || {}).sort();
  for (const wk of sortedKeys) {
    const rows = state.weeks[wk] || [];
    for (const r of rows) {
      const cells = [wk, r.role || '', r.goal || ''];
      for (let i = 0; i < 7; i++) {
        const tasks = (r.tasks && r.tasks[i]) || [];
        cells.push(tasks.map(t => (t.done ? '✓ ' : '☐ ') + (t.text || '')).join('\n'));
      }
      data.push(cells);
    }
  }
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:12},{wch:14},{wch:24},{wch:18},{wch:18},{wch:18},{wch:18},{wch:18},{wch:18},{wch:18}];
  XLSX.utils.book_append_sheet(wb, ws, '주간 계획');
  XLSX.writeFile(wb, `weekly-planner-${new Date().toISOString().slice(0,10)}.xlsx`);
}

function importData(file) {
  if (typeof XLSX === 'undefined') {
    alert('엑셀 라이브러리를 불러올 수 없습니다. 네트워크를 확인해주세요.');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      if (!sheet) { alert('시트가 비어 있습니다.'); return; }
      const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      const weekKeyRe = /^\d{4}-W\d{2}$/;
      const weeks = {};
      for (let i = 1; i < aoa.length; i++) {
        const r = aoa[i];
        if (!r || r.length === 0) continue;
        const wk = String(r[0] || '').trim();
        if (!weekKeyRe.test(wk)) continue;
        const role = String(r[1] || '').trim();
        const goal = String(r[2] || '').trim();
        const tasks = { 0: [], 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] };
        for (let d = 0; d < 7; d++) {
          const cell = String(r[3 + d] || '');
          if (!cell.trim()) continue;
          for (const line of cell.split(/\r?\n/)) {
            const t = line.trim();
            if (!t) continue;
            let done = false, text = t;
            if (text.startsWith('✓')) { done = true; text = text.slice(1).trim(); }
            else if (text.startsWith('☐')) { text = text.slice(1).trim(); }
            tasks[d].push({ id: uuid(), text, done });
          }
        }
        if (!weeks[wk]) weeks[wk] = [];
        weeks[wk].push({ id: uuid(), role, goal, tasks });
      }
      if (Object.keys(weeks).length === 0) {
        alert('가져올 데이터가 없습니다. 첫 컬럼이 "YYYY-Wnn" 형식의 주 키여야 합니다.');
        return;
      }
      if (!confirm('현재 데이터를 가져온 데이터로 덮어쓸까요? (시트도 함께 덮어씌워집니다)')) return;
      state = { weeks, lastModified: Date.now() };
      saveLocalCache();
      render();
      if (isConfigured()) {
        setSyncStatus('syncing', '저장 중...');
        apiPost({ action: 'replaceAllData', state })
          .then(() => setSyncStatus('synced', '저장됨'))
          .catch(err => { console.error(err); setSyncStatus('error', '저장 오류'); });
      }
    } catch (err) {
      alert('파일 읽기 오류: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function reloadFromServer() {
  if (dirtyWeeks.size > 0 || inFlightSaves > 0) {
    if (!confirm('저장되지 않은 변경사항이 있을 수 있습니다. 서버 데이터로 덮어쓸까요?')) return;
  }
  document.getElementById('loadingOverlay').style.display = 'flex';
  state = { weeks: {}, lastModified: 0 };
  saveLocalCache();
  loadFromServer();
}

// =====================================================
// INIT
// =====================================================
function init() {
  loadLocalCache();
  gotoWeek(new Date());

  document.getElementById('prevWeek').onclick = () => gotoWeek(addDays(currentWeekStart, -7));
  document.getElementById('nextWeek').onclick = () => gotoWeek(addDays(currentWeekStart, 7));
  document.getElementById('todayBtn').onclick = () => gotoWeek(new Date());
  document.getElementById('addRowBtn').onclick = addRow;
  document.getElementById('addGoalBtn').onclick = addGoal;
  document.getElementById('copyLastBtn').onclick = copyFromLastWeek;
  document.getElementById('exportBtn').onclick = exportData;
  document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
  document.getElementById('importFile').onchange = (e) => {
    if (e.target.files[0]) { importData(e.target.files[0]); e.target.value = ''; }
  };
  document.getElementById('reloadBtn').onclick = reloadFromServer;

  window.addEventListener('beforeunload', (e) => {
    if (dirtyWeeks.size > 0 || inFlightSaves > 0) {
      e.preventDefault();
      e.returnValue = '저장 중인 변경사항이 있습니다.';
    }
  });

  loadFromServer();
}

window.addEventListener('DOMContentLoaded', init);
</script>
